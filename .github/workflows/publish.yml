name: Publish Package

on:
  push:
    branches:
      - master

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Step 1: Install Node first WITHOUT registry config
      - name: Setup Node.js (Basic)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Step 2: Upgrade npm while it's still using the public registry
      - name: Update npm
        run: npm install -g npm@11.1.0

      # Step 3: Re-run setup-node to configure the registry for publishing
      - name: Configure Registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
