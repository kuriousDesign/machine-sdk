name: Publish Package

on:
  push:
    branches:
      - master

permissions:
  id-token: write  # Required for OIDC / Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Use the trailing slash to ensure correct .npmrc matching
          registry-url: 'https://registry.npmjs.org/'

      - name: Fix npm & Debug Auth
        # 1. Update to a stable version known to work with Node 22
        # 2. Use --registry to avoid 403 errors from the runner's temp config
        # 3. Check 'whoami' to verify the secret is actually working
        run: |
          npm install -g npm@11.1.0 --registry=https://registry.npmjs.org/
          echo "Checking authentication status..."
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Publish to npm
        # Using --access public is safer for scoped packages (@user/pkg)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
